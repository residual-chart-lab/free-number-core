name: Apply arXiv review pass 2

on:
  push:
    branches:
      - arxiv/core-v1-manuscript
    paths:
      - arxiv/manuscript/review-pass2.patch
      - .github/workflows/apply-arxiv-review-pass2.yml

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: arxiv/core-v1-manuscript
          fetch-depth: 0

      - name: Apply reviewed manuscript patch
        run: |
          git apply --check arxiv/manuscript/review-pass2.patch
          git apply arxiv/manuscript/review-pass2.patch

      - name: Commit updated manuscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arxiv/manuscript/main.tex
          git commit -m "Apply second hostile review to arXiv manuscript"
          git push origin HEAD:arxiv/core-v1-manuscript
