name: Temporary PR 3 integration

on:
  pull_request:
    types: [reopened]
    branches: [core-reconstruction]

permissions:
  contents: write

jobs:
  integrate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/audit-claims-ledger-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Preserve previous PDF
        run: |
          mkdir -p audit-artifact
          cp core/free_numbers_core_v1.pdf audit-artifact/free_numbers_core_v1_before.pdf

      - name: Integrate audited repairs
        run: python3 scripts/integrate_audit_repairs_v2.py

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            latexmk poppler-utils tex-gyre \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-fonts-extra texlive-plain-generic texlive-science lmodern >/dev/null

      - name: Compile and validate Core v1
        working-directory: core
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error free_numbers_core_v1.tex
          test "$(head -c 5 free_numbers_core_v1.pdf)" = "%PDF-"
          pages="$(pdfinfo free_numbers_core_v1.pdf | awk '/^Pages:/ {print $2}')"
          test -n "$pages"
          test "$pages" -ge 1
          echo "Validated PDF with $pages pages."

      - name: Validate repaired text and render samples
        run: |
          grep -Fq 'F_1:=T(U)/I' paper/free_numbers.tex
          grep -Fq 'Current root-only certified system' notes/12-certified-red-restricted-weak-confluence.md
          grep -Fq 'F_2^{(4)}\cap RR' core/07-length-four-cross-boundary-propagation.md
          pdftotext core/free_numbers_core_v1.pdf audit-artifact/free_numbers_core_v1_after.txt
          grep -Fq 'consistency check' audit-artifact/free_numbers_core_v1_after.txt
          pdfinfo core/free_numbers_core_v1.pdf > audit-artifact/free_numbers_core_v1_after.pdfinfo
          cp core/free_numbers_core_v1.pdf audit-artifact/free_numbers_core_v1_after.pdf
          mkdir -p audit-artifact/rendered
          pdftoppm -png -r 144 -f 1 -l 3 core/free_numbers_core_v1.pdf audit-artifact/rendered/page

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-v1-audit-build
          path: audit-artifact/
          if-no-files-found: error

      - name: Commit to PR head
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            paper/free_numbers.tex \
            notes/12-certified-red-restricted-weak-confluence.md \
            archive/notes/12-certified-red-restricted-weak-confluence-original.md \
            core/07-length-four-cross-boundary-propagation.md \
            core/free_numbers_core_v1.tex \
            core/free_numbers_core_v1.pdf \
            CLAIMS_LEDGER_ADDENDUM_2026-07-12.md
          if git diff --cached --quiet; then
            echo 'No integration changes.'
          else
            git commit -m 'Integrate audited proof repairs and rebuild Core v1 PDF'
            git push origin HEAD:agent/audit-claims-ledger-v2
          fi
