name: Publish Free Numbers Core v1.0.0

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - core-reconstruction

permissions:
  contents: write

jobs:
  publish:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'release/core-v1-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_SHA: 9efc241d38e5ca2cd07f425b747bfb5d67ea0235
      RELEASE_TAG: core-v1.0.0
      RELEASE_TITLE: Free Numbers Core v1.0.0
      BUNDLE_DIR: Free-Numbers-Core-v1.0.0

    steps:
      - name: Check out fixed Core v1 commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify fixed commit and required files
        run: |
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test -f core/free_numbers_core_v1.pdf
          test -f core/free_numbers_core_v1.tex
          test -f core/07-length-four-cross-boundary-propagation.md
          test -f core/08-all-grade-response-reconstruction.md
          test -f core/09-core-closure-theorem.md
          test -f CLAIMS_LEDGER.md
          test -f CLAIMS_LEDGER_ADDENDUM_2026-07-12.md
          test -f certificates/core07_cross_boundary_certificate.py
          test -f certificates/core08_all_grade_response_certificate.py

      - name: Build release bundle and checksums
        run: |
          set -euo pipefail
          mkdir -p "dist/$BUNDLE_DIR/core" "dist/$BUNDLE_DIR/certificates" "dist/$BUNDLE_DIR/paper"

          cp core/free_numbers_core_v1.pdf "dist/$BUNDLE_DIR/core/"
          cp core/free_numbers_core_v1.tex "dist/$BUNDLE_DIR/core/"
          cp core/07-length-four-cross-boundary-propagation.md "dist/$BUNDLE_DIR/core/"
          cp core/08-all-grade-response-reconstruction.md "dist/$BUNDLE_DIR/core/"
          cp core/09-core-closure-theorem.md "dist/$BUNDLE_DIR/core/"
          cp paper/free_numbers.tex "dist/$BUNDLE_DIR/paper/"
          cp CLAIMS_LEDGER.md "dist/$BUNDLE_DIR/"
          cp CLAIMS_LEDGER_ADDENDUM_2026-07-12.md "dist/$BUNDLE_DIR/"
          cp certificates/core07_cross_boundary_certificate.py "dist/$BUNDLE_DIR/certificates/"
          cp certificates/core08_all_grade_response_certificate.py "dist/$BUNDLE_DIR/certificates/"

          cat > "dist/$BUNDLE_DIR/RELEASE-MANIFEST.txt" <<EOF
          Release: $RELEASE_TITLE
          Tag: $RELEASE_TAG
          Fixed commit: $TARGET_SHA
          Release date: 2026-07-13
          Repository: $GITHUB_REPOSITORY

          Scope:
          - Quaternionic exact-response Core v1
          - audited claims ledger and addendum
          - corrected local closure presentation
          - corrected length-four kernel identification
          - exact rank/reconstruction certificates

          Non-claims:
          - no universality claim
          - no complete Residual Chart OS claim
          - no complete all-n depth-spectrum classification
          - no novelty or priority determination beyond repository timestamps
          EOF

          (
            cd "dist/$BUNDLE_DIR"
            find . -type f ! -name SHA256SUMS.txt -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

          (
            cd dist
            zip -qr "$BUNDLE_DIR.zip" "$BUNDLE_DIR"
          )

          sha256sum \
            core/free_numbers_core_v1.pdf \
            "dist/$BUNDLE_DIR.zip" \
            "dist/$BUNDLE_DIR/SHA256SUMS.txt" \
            > dist/SHA256SUMS.txt

          cat > dist/RELEASE_NOTES.md <<EOF
          # Free Numbers Core v1.0.0

          This release freezes the first audited quaternionic exact-response core at commit \`$TARGET_SHA\`.

          ## Included

          - the 10-page Core v1 PDF and LaTeX source;
          - the all-grade reconstruction and composition results;
          - the corrected grade-four cross-boundary kernel argument;
          - the repository-wide claims ledger and audit addendum;
          - exact computation certificates for reconstruction and length-four ranks;
          - SHA-256 checksums for the release assets and bundle contents.

          ## Audited status

          - Core v1 reconstruction and composition survive the audit.
          - The local closure is presented explicitly as \(T(U)/(u^2+1,v^2+1,uv+vu)\cong\mathbb H\).
          - Root-only certified reduction is separated from the still-open contextual confluence problem.
          - The Core v1 closure verdict is scoped to this finite-grade quaternionic realization.

          ## Open

          The all-length spin/multiplicity/factor-origin/depth classification and the full Residual Chart OS remain open.
          EOF

      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to mutate it."
            gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --json tagName,targetCommitish,name,url,isDraft,isPrerelease
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$TARGET_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file dist/RELEASE_NOTES.md \
            core/free_numbers_core_v1.pdf#Free-Numbers-Core-v1.0.0.pdf \
            "dist/$BUNDLE_DIR.zip#Free-Numbers-Core-v1.0.0-bundle.zip" \
            dist/SHA256SUMS.txt#SHA256SUMS.txt

          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json tagName,targetCommitish,name,url,isDraft,isPrerelease

      - name: Upload release-build audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-v1.0.0-release-build
          path: dist/
          if-no-files-found: warn
          retention-days: 30
