name: Build Core v1 PDF

on:
  pull_request:
    branches:
      - core-reconstruction
    paths:
      - core/free_numbers_core_v1.tex
      - .github/workflows/build-core-v1-pdf.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-v1-pdf-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out PR merge state
        uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            latexmk \
            poppler-utils \
            tex-gyre \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-plain-generic \
            texlive-science \
            lmodern >/dev/null

      - name: Compile and validate PDF
        working-directory: core
        run: |
          set -o pipefail
          latexmk -pdf -interaction=nonstopmode -halt-on-error free_numbers_core_v1.tex 2>&1 | tee build.log
          test "$(head -c 5 free_numbers_core_v1.pdf)" = "%PDF-"
          pdfinfo free_numbers_core_v1.pdf | tee pdfinfo.txt
          pages="$(awk '/^Pages:/ {print $2}' pdfinfo.txt)"
          test -n "$pages"
          test "$pages" -ge 1
          echo "Validated PDF with $pages pages."

      - name: Upload PDF build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-numbers-core-v1-pdf
          path: |
            core/free_numbers_core_v1.pdf
            core/build.log
            core/pdfinfo.txt
          if-no-files-found: error
          retention-days: 30
