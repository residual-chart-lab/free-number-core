name: Build Core v1 PDF

on:
  push:
    branches:
      - core-reconstruction
    paths:
      - core/free_numbers_core_v1.tex
      - .github/workflows/build-core-v1-pdf.yml
  pull_request:
    branches:
      - core-reconstruction
    paths:
      - core/free_numbers_core_v1.tex
      - .github/pdf-build-trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Check out reconstruction branch
        uses: actions/checkout@v4
        with:
          ref: core-reconstruction

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            latexmk \
            poppler-utils \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            lmodern >/dev/null

      - name: Compile and validate PDF
        working-directory: core
        run: |
          if ! latexmk -pdf -interaction=nonstopmode -halt-on-error free_numbers_core_v1.tex > build.log 2>&1; then
            echo "LaTeX compilation failed. Tail of build.log:"
            tail -n 200 build.log
            exit 1
          fi
          test "$(head -c 5 free_numbers_core_v1.pdf)" = "%PDF-"
          pages="$(pdfinfo free_numbers_core_v1.pdf | awk '/^Pages:/ {print $2}')"
          test -n "$pages"
          test "$pages" -ge 1
          echo "Validated PDF with $pages pages."

      - name: Commit generated PDF to reconstruction branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/free_numbers_core_v1.pdf
          if git diff --cached --quiet; then
            echo "PDF is already current."
          else
            git commit -m "Rebuild valid Free Numbers Core v1 PDF"
            git push origin HEAD:core-reconstruction
          fi
